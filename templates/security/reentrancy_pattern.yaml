meta:
  id: SEC-GEN-REENTRANCY
  title: Potential Reentrancy - State Variable Modification
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects functions where external calls occur before state variable updates.
    Recursively traces through internal function calls to find external calls.
  recommendation: >
    Apply the Check-Effects-Interactions pattern (update state variables BEFORE external calls)
    or use a ReentrancyGuard modifier.
  cwe: [841, 362]
  owasp: ["SC02:2025 Reentrancy Attacks"]
  references:
    - https://swcregistry.io/docs/SWC-107
    - https://consensys.github.io/smart-contract-best-practices/attacks/reentrancy/

query:
  scope: entrypoint

  filter:
    # preset: unLocked returns true when the function lacks a reentrancy
    # guard — i.e. exactly the case we want to scan. No `not:` wrapper.
    preset: unLocked

  match:
    sequence:
      - kind: outgoing_call
      - kind: state_write
