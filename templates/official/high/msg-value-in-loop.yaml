meta:
  id: HIGH-MSG-VALUE-IN-LOOP
  title: "msg.value Used Inside a Loop"
  severity: HIGH
  confidence: MEDIUM
  description: >
    `msg.value` is referenced inside a loop body. `msg.value` is a transaction-
    level constant — it does NOT decrement as the loop iterates. Per-iteration
    accounting (`balances[users[i]] += msg.value`) therefore double-counts the
    same ETH N times. In payable multicalls this allows a caller to mint N×
    the actual ETH sent. Equivalent to Slither's msg-value-loop detector.
  recommendation: >
    Pass an explicit `amounts[]` array alongside `users[]` and require
    `sum(amounts) == msg.value`. Never re-use `msg.value` inside a loop.
  references:
    - https://github.com/crytic/slither/wiki/Detector-Documentation#msg-value-inside-a-loop
    - https://forum.openzeppelin.com/t/poc-multicall-with-msg-value-reuses-eth/14467

# Only payable entries can receive ETH — non-payable functions cannot exhibit
# this bug because msg.value is always 0. Restricting here cuts the FP surface
# dramatically. `mutability: payable` is wrapped in `all:` so it routes to the
# function-level precondition (see delegatecall-in-loop.yaml for why bare
# `mutability:` at the top of `where` would be wrong here).
#
# `left: {name: ^msg$}` (v1) is a bare-name check on a member_access's parent
# expression, which the engine reads off the node's `parent` attribute — the
# same value the v2 `parent:` attribute (§7 advanced) exposes directly.
query:
  from: entry_function
  select: loop
  where:
    - all:
        - mutability: payable
    - has:
        block: member
        name: ^value$
        parent: ^msg$
