meta:
  id: HIGH-DELEGATECALL-IN-LOOP
  title: "Delegatecall Inside a Loop"
  severity: HIGH
  confidence: MEDIUM
  description: >
    A `delegatecall` is invoked inside a `for` / `while` / `do-while` loop. If
    the contract receives ETH and computes per-iteration accounting from
    `msg.value` (e.g. payable multicall pattern), the same ETH can be consumed
    multiple times in a single transaction. Even with a fixed target, repeated
    delegatecalls expose the contract's storage to unintended mutations across
    iterations. Equivalent to Slither's delegatecall-loop detector.
  recommendation: >
    Do not use `delegatecall` inside loops. If a batched-call API is needed,
    either use regular external `call` (no storage merge), or guard the
    delegatecall site so each iteration receives an isolated frame.
  references:
    - https://github.com/crytic/slither/wiki/Detector-Documentation#payable-functions-using-delegatecall-inside-a-loop
    - https://forum.openzeppelin.com/t/poc-multicall-with-msg-value-reuses-eth/14467

# `delegatecall` is the semantic group covering both call.lowlevel.delegatecall
# and asm.delegatecall. `in: {block: loop}` asserts "delegatecall whose
# ancestor is a loop" — surviving non-adjacent layout (helper var assignment
# between the loop header and the call).
#
# `mutability: payable` must be wrapped in `all:` — used bare at the top of
# `where` it lowers into the AST layer (checked against the delegatecall node
# itself, which carries no mutability attribute); wrapped in `all:` it is
# recognized as context-only and routed to the function-level precondition,
# matching v1's `filter: mutability: payable` exactly.
from: entry_function
select: delegatecall
where:
  - all:
      - mutability: payable
  - in: { block: loop }
