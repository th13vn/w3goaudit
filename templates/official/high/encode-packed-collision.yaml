meta:
  id: HIGH-ENCODE-PACKED-COLLISION
  title: "Hash Collision via abi.encodePacked with Multiple Dynamic Arguments"
  severity: HIGH
  confidence: MEDIUM
  description: >
    `keccak256(abi.encodePacked(...))` is computed over two or more
    user-controlled dynamic arguments (`bytes` / `string` / dynamic arrays).
    `abi.encodePacked` inserts no length delimiters, so distinct argument
    tuples can produce the SAME packed bytes (`("a","bc")` vs `("ab","c")`).
    When that hash backs a signature check or an access decision, an attacker
    can craft a colliding input and bypass it.
  recommendation: >
    Use `abi.encode` (length-prefixed, collision-free) instead of
    `abi.encodePacked` when hashing more than one dynamic argument, or insert a
    fixed, unambiguous separator between fields.
  references:
    - https://swcregistry.io/docs/SWC-133
    - https://docs.soliditylang.org/en/latest/abi-spec.html#non-standard-packed-mode

query:
  from: function

  where:
    # Function-scope preconditions (routed to the filter/context layer): a bare
    # dual field (visibility/regex) nested inside `all:` with no AST-only
    # sibling classifies as context-only, so this `all:` reproduces v1's
    # `filter.all: [visibility, regex]` precondition exactly.
    - all:
        - visibility: public,external
        - regex: '(?s)function\s+\w+\([^)]*(?:bytes|string|address\[\]|uint256\[\])\s+\w+[^)]*(?:bytes|string|address\[\]|uint256\[\])\s+\w+'
    # No single AST anchor kind (two heterogeneous shapes), so `select:` is
    # omitted and the whole match lives in this `any:`.
    - any:
        - has:
            block: internal_call
            name: '^keccak256$'
            has:
              block: external_call
              name: '^encodePacked$'
              arg.0: { tainted: parameter }
              arg.1: { tainted: parameter }
        - sequence:
            - block: external_call
              name: '^encodePacked$'
              arg.0: { tainted: parameter }
              arg.1: { tainted: parameter }
            - block: internal_call
              name: '^keccak256$'
              arg.0: { tainted: parameter }
