meta:
  id: HIGH-PROXY-STORAGE-COLLISION
  title: "Proxy Storage Layout Collision"
  severity: HIGH
  confidence: MEDIUM
  description: >
    A contract inheriting a known upgradeable-proxy base declares its own
    mutable storage alongside a constructor. The proxy delegates to an
    implementation whose storage layout also starts at slot 0, so any mutable
    variable the proxy declares collides with the implementation's slots —
    silently corrupting state (admin/owner slots, balances) across delegatecalls.
  recommendation: >
    Keep proxy contracts storage-less. Store proxy-specific data in fixed,
    namespaced slots (EIP-1967) and never declare plain mutable state on a
    proxy. Use `immutable` / `constant` for values fixed at construction.
  references:
    - https://eips.ethereum.org/EIPS/eip-1967

# Contract-scope, no single AST anchor (this is a pure text-shape rule), so
# `select:` is omitted and the whole match lives in `where:`. `base:` is
# evaluated as a contract-scope precondition.
#
# The 3-way `and:` (two positive regexes + one negated regex) is wrapped in
# `has:` per branch. A bare `regex:` nested under `and:`/`not:` is a "dual"
# field with no AST-only sibling, so the lowerer classifies it as
# context-only and would silently route the whole condition into Filter
# (leaving Match empty -> load error). Wrapping each branch in `has:`
# (Contains, an AST-only field) forces AST-layer routing, keeping the
# existential per-branch "some declaration/constructor line matches" behavior
# equivalent to the original whole-contract-text scan.
query:
  from: contract
  where:
    - base: '(UpgradeabilityProxy|AdminUpgradeabilityProxy|OwnedUpgradeabilityProxy|TransparentUpgradeableProxy|ERC1967Proxy)'
    - and:
        - has:
            regex: '(?m)^\s*[A-Za-z_][A-Za-z0-9_<>,\[\] ]+\s+(?:public|private|internal)?\s*[A-Za-z_][A-Za-z0-9_]*\s*(?:=|;)'
        - has:
            regex: '\bconstructor\s*\('
        - not:
            has:
              regex: '(?m)^\s*[A-Za-z_][A-Za-z0-9_<>,\[\] ]+\s+(?:immutable|constant)\b'
