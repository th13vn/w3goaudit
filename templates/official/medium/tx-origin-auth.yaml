meta:
  id: MEDIUM-TX-ORIGIN-AUTH
  title: tx.origin Used for Authentication
  severity: MEDIUM
  confidence: HIGH
  description: >
    tx.origin is used for authentication inside a conditional or require statement.
    This is a phishing attack vector — an attacker can trick the legitimate
    tx.origin into calling a malicious contract that then calls this function,
    bypassing the intended access control.
  recommendation: >
    Replace tx.origin with msg.sender. Use msg.sender for access control checks.
    If cross-contract calls with origin tracking are needed, pass msg.sender
    explicitly as a parameter.
  references:
    - https://swcregistry.io/docs/SWC-115
    - https://docs.soliditylang.org/en/latest/security-considerations.html#tx-origin

# Whitelist the legitimate anti-contract idiom `require(msg.sender ==
# tx.origin)` / `tx.origin == msg.sender`, which asserts the caller is an EOA
# rather than authenticating. Slither excludes the same form. `not: {regex:}`
# here is function-source-scoped (routes to the context/filter layer via
# ruleIsContextOnly), matching v1's `filter: not: {regex: ...}` exactly.
#
# `tx.origin` inside ANY guard or branch (require / assert / revert /
# if / conditional) — all are auth-shaped uses. The previous version
# only matched `stmt.if`, missing the very common `require(tx.origin ==
# owner, ...)` form (the single most-popular tx.origin auth pattern).
query:
  from: function
  select: member
  where:
    - not: { regex: "(msg\\.sender\\s*==\\s*tx\\.origin|tx\\.origin\\s*==\\s*msg\\.sender)" }
    - name: "tx\\.origin"
    - in:
        any:
          - block: require
          - block: assert
          - block: if
          - block: ternary
