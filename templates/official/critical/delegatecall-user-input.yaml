meta:
  id: CRITICAL-DELEGATECALL-USER-INPUT
  title: Delegatecall to User-Controlled Address
  severity: CRITICAL
  confidence: HIGH
  description: >
    A delegatecall is executed with a target address that comes from a function
    parameter (user-controlled). An attacker can pass a malicious contract address
    as the target, which will execute arbitrary code in the context of this contract,
    potentially draining funds, changing ownership, or corrupting storage.
  recommendation: >
    Never delegatecall to user-supplied addresses. Maintain a whitelist of trusted
    implementation addresses, or use an upgradeable proxy pattern with a timelocked
    admin role for changing the implementation.
  references:
    - https://swcregistry.io/docs/SWC-112
    - https://consensys.github.io/smart-contract-best-practices/attacks/delegatecall/

query:
  from: entry_function
  select: delegatecall
  where:
    - not: { preset: access_controlled }
    - has:
        block: identifier
        receiver: true
        tainted: parameter
