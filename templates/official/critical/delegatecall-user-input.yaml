meta:
  id: CRITICAL-DELEGATECALL-USER-INPUT
  title: Delegatecall to User-Controlled Address
  severity: CRITICAL
  confidence: HIGH
  description: >
    A delegatecall is executed with a target address controlled by the caller,
    either through a function parameter or caller identity. An attacker can supply
    a malicious contract address as the target, which will execute arbitrary code
    in this contract's context and can drain funds or corrupt storage.
  recommendation: >
    Never delegatecall to user-supplied addresses. Maintain a whitelist of trusted
    implementation addresses, or use an upgradeable proxy pattern with a timelocked
    admin role for changing the implementation.
  references:
    - https://swcregistry.io/docs/SWC-112
    - https://consensys.github.io/smart-contract-best-practices/attacks/delegatecall/

query:
  from: entry_function
  select: delegatecall
  where:
    - not: { preset: access_controlled }
    - has:
        receiver: true
        tainted: user_controlled
