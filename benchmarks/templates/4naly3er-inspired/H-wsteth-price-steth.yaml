meta:
  id: 4NALY3ER-H-004
  title: "wstETH Price Using stEthPerToken (Not ETH Units)"
  severity: HIGH
  confidence: HIGH
  description: >
    Detects code that multiplies a price variable with wstETH's stEthPerToken().
    wstETH's stEthPerToken() returns a ratio in stETH units, NOT ETH units.
    Even post-Shanghai, stETH is not perfectly pegged to ETH. Multiplying an
    ETH price by stEthPerToken() produces inflated or incorrect pricing.
    Equivalent to 4naly3er's wstETHPriceStEth detector.
  recommendation: >
    Use getStETHByWstETH() or getWstETHByStETH() for stETH<->wstETH
    conversions, and consult a trustworthy ETH/stETH price feed if you need
    ETH-denominated wstETH pricing.

query:
  from: function
  select: binary
  where:
    - operator: "\\*"
    - all:
        - has:
            block: identifier
            name: (?i)price
        - has:
            block: external_call
            name: stEthPerToken
