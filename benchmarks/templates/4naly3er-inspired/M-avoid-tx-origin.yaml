meta:
  id: 4NALY3ER-M-001
  title: "tx.origin Used for Authorization"
  severity: MEDIUM
  confidence: HIGH
  description: >
    Detects tx.origin used in conditional checks (require, if, assert).
    tx.origin is the original EOA that started the transaction chain.
    A malicious contract can trick the legitimate user into making a call,
    and then use their tx.origin to pass access control — a phishing attack.
    Use msg.sender for all authorization checks.
    Equivalent to 4naly3er's avoidTx.origin detector.
  recommendation: >
    Replace tx.origin with msg.sender for authorization. tx.origin can only
    safely be used to distinguish EOA callers from contract callers (not for
    auth), e.g., require(tx.origin == msg.sender).

from: function
select: member
where:
  - name: "tx\\.origin"
  - in:
      any:
        - block: require
        - block: assert
        - block: if
