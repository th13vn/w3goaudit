meta:
  id: 4NALY3ER-H-001
  title: "Incorrect Comparison Implementation (Outside Condition)"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects comparison operators (==, !=, <, >, <=, >=) used in expressions
    that are NOT inside a require, if, assert, or loop condition. A bare
    comparison like `a == b;` as a statement does nothing — the result is
    discarded. This is almost always a bug: the developer intended to use
    require(a == b) or check the result in a conditional.
    Equivalent to 4naly3er's comparisonOutsideCondition detector.
  recommendation: >
    Wrap comparisons in require(), assert(), or if() statements. Never use
    a standalone comparison as a statement.

# A comparison is "outside a condition" only when no enclosing construct
# consumes its result. Treat require/assert/if/return as consuming, plus
# loop (for/while condition), and binary so chained logical comparisons
# (`a == b && c == d`) don't each trigger.
from: function
select: binary
where:
  - operator: (==|!=|<|>|<=|>=)
  - not:
      in:
        any:
          - block: require
          - block: assert
          - block: if
          - block: loop
          - block: return
          - block: binary
