meta:
  id: 4NALY3ER-M-007
  title: "block.number Used on L2 (Unreliable)"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects use of block.number in conditional logic. On L2 networks
    (Optimism, Arbitrum, Base), block.number does NOT correspond to the
    L2 block number — it returns the L1 block number (on Optimism) or an
    arbitrary value (on Arbitrum where blocks move much faster). Code
    relying on block.number for time-based logic produces incorrect behavior
    on L2.
    Equivalent to 4naly3er's blockNumberL2 detector.
  recommendation: >
    Use block.timestamp instead of block.number for time-based calculations
    on L2. If L2 block numbers are needed, use the network-specific block
    number opcode or APIs.

from: function
select: member
where:
  - name: "block\\.number"
  - in:
      any:
        - block: if
        - block: require
        - block: assert
        - block: return
        - block: binary
