meta:
  id: 4NALY3ER-M-009
  title: "ERC721 transferFrom() Instead of safeTransferFrom()"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects use of transferFrom() which does not verify the recipient can
    handle ERC721 tokens. If the recipient is a contract without IERC721Receiver
    support, the NFT becomes permanently locked.
    Equivalent to 4naly3er's erc721safeTransferFrom detector.
    Note: to reduce FPs, this targets `external_call` plus the transferFrom name.
  recommendation: >
    Use safeTransferFrom() instead of transferFrom() for ERC721 transfers.

# ERC20 and ERC721 transferFrom share the same 3-arg shape, so the AST
# alone can't distinguish them. Restrict to contracts that inherit ERC721
# to keep the detector usable; without this filter every ERC20
# transferFrom call gets flagged.
# `external_call` plus `name:` identifies the ERC721 method shape.
query:
  from: function
  select: external_call
  where:
    - base: (?i)(ERC721|IERC721|ERC721Upgradeable)
    - name: ^transferFrom$
    - arg.2:
        block: identifier
