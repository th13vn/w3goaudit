meta:
  id: 4NALY3ER-M-010
  title: "Fee Parameter Can Exceed 100%"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects privileged setter functions that write to fee/tax/rate named
    state variables without any require/assert guard. Without an upper bound
    check, an owner can set fees above 100%, draining users during operations.
    Equivalent to 4naly3er's feeOver100 detector.
  recommendation: >
    Add a require() check: require(newFee <= MAX_FEE, "Fee too high").
    Where MAX_FEE is at most 10000 for BPS (100%).

# Restrict to state writes whose LHS identifier looks like a rate variable
# (fee/tax/rate/bps/commission/percent). Without this restriction the
# template flagged every owner-only setter that didn't have a guard, which
# is far too broad to be useful.
from: entry_function
where:
  - modifier: (?i)(onlyOwner|onlyAdmin|onlyRole|onlyGov|onlyGovernance)
  - has:
      block: assign
      is_state_var: true
      left:
        name: (?i)(fee|tax|rate|bps|commission|percent|royalty)
  - not:
      has:
        block: guard
