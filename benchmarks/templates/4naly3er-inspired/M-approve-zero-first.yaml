meta:
  id: 4NALY3ER-M-005
  title: "ERC20 approve() Without Resetting to 0 First"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects direct approve() calls that are NOT immediately preceded by an
    approve(..., 0) call in the same function. Tokens like USDT require the
    allowance to be reset to 0 before setting a new non-zero value.
    Calling approve(spender, amount) directly when an existing allowance is
    non-zero will revert for these tokens, causing DoS.
    Equivalent to 4naly3er's approve0first detector.
  recommendation: >
    Use OpenZeppelin's forceApprove() or explicitly: token.approve(spender, 0);
    token.approve(spender, amount);

from: function
select: external_call
where:
  - name: ^approve$
  - arg.1:
      block: identifier
      tainted: parameter
