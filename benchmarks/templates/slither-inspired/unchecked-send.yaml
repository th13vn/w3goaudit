meta:
  id: SLITHER-UNCHECKED-SEND
  title: "Unchecked send() Return Value"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects .send() calls whose boolean return value is not checked. The send()
    function returns false on failure instead of reverting, so if the return
    value is ignored, ETH will be locked in the contract upon failure.
    Equivalent to Slither's unchecked-send detector.
  recommendation: >
    Check the return value: require(addr.send(amount), "send failed"). Or prefer
    .call{value: amount}("") with return value check, or payable(addr).transfer().

query:
  scope: function

  match:
    contains:
      kind: call.builtin.send
      not:
        inside:
          any:
            - kind: check.require
            - kind: check.assert
            - kind: stmt.if
            - kind: stmt.assign
