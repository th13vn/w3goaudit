meta:
  id: SLITHER-TX-ORIGIN
  title: "tx.origin Used for Authorization"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects use of tx.origin for authorization checks (inside require, if,
    or assert). tx.origin returns the original external account that started
    the transaction, which can be exploited via phishing: if the legitimate
    owner interacts with a malicious contract, that contract can call the
    vulnerable contract and pass the tx.origin check. Equivalent to Slither's
    tx-origin detector.
  recommendation: >
    Use msg.sender instead of tx.origin for authentication. msg.sender is the
    immediate caller and cannot be manipulated via contract-to-contract calls.
  references:
    - https://swcregistry.io/docs/SWC-115
    - https://docs.soliditylang.org/en/latest/security-considerations.html#tx-origin

# Double-escape backslash inside a quoted YAML string so the engine
# receives `tx\.origin` as a regex (literal dot). The previous bare
# `tx\.origin` (unquoted) only worked by accident — different YAML
# parsers handle backslashes inconsistently.
from: function
select: member
where:
  - name: "tx\\.origin"
  - in:
      any:
        - block: require
        - block: assert
        - block: if
