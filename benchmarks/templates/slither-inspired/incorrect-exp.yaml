meta:
  id: SLITHER-INCORRECT-EXP
  title: "Incorrect Exponentiation (^ Instead of **)"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects use of the ^ operator (bitwise XOR) which is often confused with
    the ** exponentiation operator. In Solidity, ^ is XOR, not power. Using
    2^8 yields 10, not 256. Equivalent to Slither's incorrect-exp detector.
  recommendation: >
    Replace ^ with ** for exponentiation. Use ^ only when bitwise XOR is
    intentionally needed.

query:
  scope: function

  # Flag `^` that looks like exponentiation, not bit manipulation: both operands
  # are simple values (identifier or decimal number — not a sub-expression, not a
  # hex mask) AND the enclosing statement has no other bitwise/shift operator.
  # Catches `base ^ exp`, `2 ^ 8`, `10 ^ 18` while excluding `(a & b) + (a ^ b)/2`,
  # `(3 * d) ^ 2`, and `x ^ 0xFF`.
  match:
    contains:
      kind: expr.binary_op
      operator: "\\^"
      left:
        any:
          - kind: expr.identifier
          - kind: expr.literal
            attr:
              subtype: number
      right:
        any:
          - kind: expr.identifier
          - kind: expr.literal
            attr:
              subtype: number
      not:
        statement_contains:
          any:
            - kind: expr.binary_op
              operator: "&|\\||<<|>>"
            - kind: expr.unary_op
              operator: "~"
