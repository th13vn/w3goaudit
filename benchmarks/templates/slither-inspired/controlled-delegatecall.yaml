meta:
  id: SLITHER-CONTROLLED-DELEGATECALL
  title: "Controlled Delegatecall Destination"
  severity: HIGH
  confidence: HIGH
  description: >
    Detects delegatecall where the target address is caller-controlled through a
    function parameter or caller identity. A malicious contract target executes
    arbitrary code in this contract's context and can drain funds or corrupt
    storage. Equivalent to Slither's controlled-delegatecall detector.
  recommendation: >
    Never delegatecall to user-supplied addresses. Use a whitelist of trusted
    implementation addresses or an upgradeable proxy pattern with a timelocked
    admin role for changing the implementation.

query:
  from: entry_function
  select: delegatecall
  where:
    - not: { preset: access_controlled }
    - has: { receiver: true, tainted: user_controlled }
