meta:
  id: SLITHER-REENTRANCY-BALANCE
  title: "Reentrancy via Balance Check"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects pattern where a balance is read (e.g., balanceOf) before an external
    call. An attacker could manipulate the balance during a reentrant call,
    causing post-call balance checks to use stale values. This is common in
    protocols that compute mint amounts based on balance deltas.
    Equivalent to Slither's reentrancy-balance detector.
  recommendation: >
    Use transferFrom instead of relying on balance deltas. Add a reentrancy
    guard (nonReentrant) to functions that read balances before external calls.

query:
  scope: entrypoint

  filter:
    preset: unLocked

  match:
    sequence:
      - kind: call.external
        name: (?i)balanceOf
      - kind: outgoing_call
