meta:
  id: SLITHER-REENTRANCY-NO-ETH
  title: "Reentrancy Without ETH (State Modification)"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects reentrancy where an external call occurs before state variable
    updates, but no ETH is transferred. While less severe than ETH-based
    reentrancy, an attacker can still exploit stale state for logical errors
    (e.g., double-voting, double-minting). Equivalent to Slither's
    reentrancy-no-eth detector.
  recommendation: >
    Apply the Checks-Effects-Interactions pattern or use a reentrancy guard
    (e.g. OpenZeppelin nonReentrant).

# Reentrancy guard detection is centralized in `preset: reentrancy_guarded`.
query:
  from: entry_function
  where:
    - not: { preset: reentrancy_guarded }
    - sequence:
        - block: external_call
        - block: state_write
