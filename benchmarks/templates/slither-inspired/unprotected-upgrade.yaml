meta:
  id: SLITHER-UNPROTECTED-UPGRADE
  title: "Unprotected Initializer Function"
  severity: HIGH
  confidence: HIGH
  description: >
    Detects initialize/initializer functions without access control. In
    upgradeable contracts, the initialize function replaces the constructor
    and must be called exactly once by the deployer. Without access control,
    anyone can call initialize and take ownership of the proxy.
    Equivalent to Slither's unprotected-upgrade detector.
  recommendation: >
    Add an initializer modifier (OpenZeppelin) and access control to
    initialize functions. Consider using _disableInitializers() in the
    constructor of implementation contracts.

from: entry_function
select: state_write
where:
  - func_name: (?i)^(initialize|initialise|init)$
  - not: { preset: access_controlled }
