meta:
  id: SLITHER-MSG-VALUE-LOOP
  title: "msg.value Used Inside a Loop"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects the use of msg.value inside a loop body. Since msg.value remains
    constant for the entire transaction, using it in each iteration can lead
    to accounting errors — the total credited amount may exceed the actual
    ETH sent. Equivalent to Slither's msg-value-loop detector.
  recommendation: >
    Pass an explicit array of amounts alongside the receivers array. Validate
    that the sum of all amounts equals msg.value. Do not reuse msg.value per
    iteration.

query:
  scope: entrypoint

  match:
    contains:
      kind: stmt.loop
      contains:
        kind: expr.member_access
        name: "msg\\.value"
