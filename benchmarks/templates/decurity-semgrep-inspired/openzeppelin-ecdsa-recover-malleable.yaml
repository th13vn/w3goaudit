meta:
  id: DECURITY-OPENZEPPELIN-ECDSA-RECOVER-MALLEABLE
  title: "Decurity Semgrep: ECDSA.recover result is keyed by raw signature bytes"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects ECDSA.recover flows where the raw signature bytes are later used as
    a state key, leaving signature malleability edge cases.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  where:
    - sequence:
        - block: external_call
          name: '^recover$'
          has:
            receiver: true
            name: '^ECDSA$'
        - block: state_write
          left:
            block: index
            has:
              tainted: parameter
