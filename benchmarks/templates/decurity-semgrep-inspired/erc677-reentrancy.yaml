meta:
  id: DECURITY-ERC677-REENTRANCY
  title: "Decurity Semgrep: ERC677 transfer invokes callAfterTransfer callback"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects ERC677-style transfer implementations that invoke the post-transfer
    callback without a reentrancy guard.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  select: internal_call
  where:
    - func_name: '^transfer$'
    - not: { preset: reentrancy_guarded }
    - name: '^callAfterTransfer$'
