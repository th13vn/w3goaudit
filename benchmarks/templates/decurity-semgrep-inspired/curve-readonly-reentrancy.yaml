meta:
  id: DECURITY-CURVE-READONLY-REENTRANCY
  title: "Decurity Semgrep: Curve get_virtual_price read is not protected from read-only reentrancy"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects Curve get_virtual_price reads that are not guarded by a read-only
    reentrancy mitigation.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: function
  filter:
    all:
      - not:
          regex: 'remove_liquidity\s*\('
      - not:
          regex: 'claim_admin_fees\s*\('
  match:
    contains:
      kind: call.external
      name: '^get_virtual_price$'
