meta:
  id: DECURITY-PROXY-STORAGE-COLLISION
  title: "Decurity Semgrep: Proxy child declares storage before constructor"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects contracts inheriting common proxy bases while declaring mutable
    storage before/alongside a constructor, a storage collision risk.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: contract
  where:
    - base: '(UpgradeabilityProxy|AdminUpgradeabilityProxy|OwnedUpgradeabilityProxy|TransparentUpgradeableProxy|ERC1967Proxy)'
    - all:
        - has:
            regex: '(?m)^\s*[A-Za-z_][A-Za-z0-9_<>,\[\] ]+\s+(?:public|private|internal)?\s*[A-Za-z_][A-Za-z0-9_]*\s*(?:=|;)'
        - has:
            regex: '\bconstructor\s*\('
        - not:
            has:
              regex: '(?m)^\s*[A-Za-z_][A-Za-z0-9_<>,\[\] ]+\s+(?:immutable|constant)\b'
