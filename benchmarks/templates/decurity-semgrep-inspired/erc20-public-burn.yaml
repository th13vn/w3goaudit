meta:
  id: DECURITY-ERC20-PUBLIC-BURN
  title: "Decurity Semgrep: Public burn can burn another account"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects public/external burn functions that can pass a user-controlled
    account into _burn without authentication.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: entry_function
select: internal_call
where:
  - func_name: '^burn$'
  - not: { preset: access_controlled }
  - name: '^_burn$'
  - arg.0: { tainted: parameter }
