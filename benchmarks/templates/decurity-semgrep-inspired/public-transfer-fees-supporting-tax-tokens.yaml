meta:
  id: DECURITY-PUBLIC-TRANSFER-FEES-SUPPORTING-TAX-TOKENS
  title: "Decurity Semgrep: Fee-supporting transfer helper is public/external"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects fee-supporting transfer helpers exposed as public/external
    functions without authentication.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: entrypoint
  filter:
    all:
      - func_name: '^_transferFeesSupportingTaxTokens$'
      - preset: unAuthenticated
  match: {}
