meta:
  id: DECURITY-PUBLIC-TRANSFER-FEES-SUPPORTING-TAX-TOKENS
  title: "Decurity Semgrep: Fee-supporting transfer helper is public/external"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects fee-supporting transfer helpers exposed as public/external
    functions without authentication.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

# v1 `match: {}` (filter-only, function itself is the finding) has no direct
# `select:` equivalent (select always wraps in Contains, which searches
# descendants rather than matching the scope root). Idiom: no select; add a
# bare `block: function` where item, which sets Rule.Kind directly with no
# select and no Contains wrapper, so buildMatch's no-select path returns it
# as-is and Verify(root, {Kind: decl.function}) trivially matches the root.
query:
  from: entry_function
  where:
    - func_name: '^_transferFeesSupportingTaxTokens$'
    - not: { preset: access_controlled }
    - block: function
