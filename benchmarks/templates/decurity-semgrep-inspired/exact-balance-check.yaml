meta:
  id: DECURITY-EXACT-BALANCE-CHECK
  title: "Decurity Semgrep: Exact balance equality is used as an action condition"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects action guards that compare token or ETH balance with exact
    equality, which can be griefed by dust transfers.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: function
select: guard
where:
  - has:
      block: binary
      operator: '=='
      has:
        any:
          - block: external_call
            name: '^balanceOf$'
          - block: member
            name: '^balance$'
