meta:
  id: DECURITY-ENCODE-PACKED-COLLISION
  title: "Decurity Semgrep: abi.encodePacked hashes multiple dynamic arguments"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects keccak256(abi.encodePacked(...)) over multiple user-controlled
    dynamic inputs.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: function
  where:
    - all:
        - visibility: public,external
        - regex: '(?s)function\s+\w+\([^)]*(?:bytes|string|address\[\]|uint256\[\])\s+\w+[^)]*(?:bytes|string|address\[\]|uint256\[\])\s+\w+'
    - any:
        - has:
            block: internal_call
            name: '^keccak256$'
            has:
              block: external_call
              name: '^encodePacked$'
              arg.0: { tainted: parameter }
              arg.1: { tainted: parameter }
        - sequence:
            - block: external_call
              name: '^encodePacked$'
              arg.0: { tainted: parameter }
              arg.1: { tainted: parameter }
            - block: internal_call
              name: '^keccak256$'
              arg.0: { tainted: parameter }
