meta:
  id: DECURITY-ACCESSIBLE-SELFDESTRUCT
  title: "Decurity Semgrep: Contract can be destructed by anyone"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects public/external functions that can reach selfdestruct or suicide
    without an authentication guard. Any caller-triggerable destruction is
    vulnerable regardless of whether the beneficiary is fixed or caller-controlled.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  select: selfdestruct
  where:
    - not: { preset: access_controlled }
