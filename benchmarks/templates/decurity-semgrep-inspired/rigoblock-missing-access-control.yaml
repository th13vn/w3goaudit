meta:
  id: DECURITY-RIGOBLOCK-MISSING-ACCESS-CONTROL
  title: "Decurity Semgrep: setMultipleAllowances is public without access control"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated setMultipleAllowances functions.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: entry_function
where:
  - func_name: '^setMultipleAllowances$'
  - not: { preset: access_controlled }
  - block: function
