meta:
  id: DECURITY-TECRA-COIN-BURNFROM-BUG
  title: "Decurity Semgrep: burnFrom checks allowance with from in spender position"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects burnFrom implementations where the allowance check uses `from` in
    the spender position before burning from that same address.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: function
where:
  - all:
      - func_name: '.*burnFrom.*'
      - regex: '(?:_allowances|allowance)\s*(?:\[|\()'
  - sequence:
      - block: require
        has:
          block: identifier
          name: '^from$'
      - block: internal_call
        name: '^_burn$'
        arg.0:
          name: '^from$'
