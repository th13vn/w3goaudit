meta:
  id: DECURITY-GEARBOX-TOKENS-PATH-CONFUSION
  title: "Decurity Semgrep: UniswapV3 path is parsed from the wrong side"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects path.toAddress(path.length - X), which reads a Uniswap V3 path
    address from the wrong side.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: function
  match:
    contains:
      kind: call.external
      name: '^toAddress$'
      args:
        0:
          kind: expr.binary_op
          operator: '-'
          left:
            kind: expr.member_access
            name: '^length$'
