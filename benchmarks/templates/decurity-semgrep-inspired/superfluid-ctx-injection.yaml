meta:
  id: DECURITY-SUPERFLUID-CTX-INJECTION
  title: "Decurity Semgrep: Superfluid ctx is decoded without prior validation"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects decodeCtx(ctx) usage without an isCtxValid guard in the same
    function.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: function
select: external_call
where:
  - not:
      regex: '\.isCtxValid\s*\('
  - name: '^decodeCtx$'
  - arg.0:
      name: '^ctx$'
