meta:
  id: DECURITY-MSG-VALUE-MULTICALL
  title: "Decurity Semgrep: msg.value is used inside a Multicall-style contract"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects msg.value usage inside Multicall/Batchable-style contracts where
    value can be reused across batched calls.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: entrypoint
  filter:
    extends: '(?i)(Multicall|BoringBatchable|Batchable)'
  match:
    contains:
      kind: expr.member_access
      name: '^msg\.value$'
