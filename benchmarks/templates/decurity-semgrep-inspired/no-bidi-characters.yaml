meta:
  id: DECURITY-NO-BIDI-CHARACTERS
  title: "Decurity Semgrep: Source contains bidirectional Unicode control characters"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects bidirectional Unicode control characters in source text. This is a
    raw-source check because the Solidity AST intentionally drops comments and
    other lexical trivia.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: source
where:
  - regex: '[\x{202A}\x{202B}\x{202D}\x{202E}\x{2066}\x{2067}\x{2068}\x{202C}\x{2069}]'
