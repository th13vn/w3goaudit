meta:
  id: DECURITY-ARBITRARY-LOW-LEVEL-CALL
  title: "Decurity Semgrep: Attacker controlled address/calldata reaches low-level call"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated entrypoints where a user-controlled receiver and
    user-controlled calldata reach a low-level call.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: entrypoint
  filter:
    preset: unAuthenticated
  match:
    contains:
      kind: call.lowlevel.call
      all:
        - contains:
            attr:
              call_receiver: true
            tainted_from: parameter
        - args:
            0:
              tainted_from: parameter
