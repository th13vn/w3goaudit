meta:
  id: DECURITY-SENSE-MISSING-ORACLE-ACCESS-CONTROL
  title: "Decurity Semgrep: Oracle update helper is reachable from public/external entrypoint"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated oracle submission entrypoints that call
    _updateOracle.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: entrypoint
  filter:
    preset: unAuthenticated
  match:
    contains:
      kind: call.internal
      name: '^_updateOracle$'
