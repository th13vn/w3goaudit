meta:
  id: DECURITY-ERC721-REENTRANCY
  title: "Decurity Semgrep: ERC721 safe transfer invokes onERC721Received callback"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects ERC721 entrypoints that invoke the receiver hook without a
    reentrancy guard.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  select: internal_call
  where:
    - not: { preset: reentrancy_guarded }
    - name: '^_checkOnERC721Received$'
