meta:
  id: DECURITY-ORACLE-PRICE-UPDATE-NOT-RESTRICTED
  title: "Decurity Semgrep: Oracle price setter is public/external without owner restriction"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated public/external oracle price update functions.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: entrypoint
  filter:
    all:
      - func_name: '(?i)^(setOracleData|setAssetPrice|.*(oracle|price).*)$'
      - preset: unAuthenticated
  match:
    contains:
      kind: state_write
      right:
        tainted_from: parameter
