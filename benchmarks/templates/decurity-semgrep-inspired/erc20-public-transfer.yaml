meta:
  id: DECURITY-ERC20-PUBLIC-TRANSFER
  title: "Decurity Semgrep: Custom ERC20 exposes _transfer as public/external"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects token implementations that expose the internal-style _transfer
    helper as a public/external entrypoint.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  where:
    - func_name: '^_transfer$'
    - block: function
