meta:
  id: DECURITY-BASIC-ARITHMETIC-UNDERFLOW
  title: "Decurity Semgrep: Parameter-controlled subtraction may underflow"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects subtraction where the subtrahend is user-controlled, reducing noise
    from unrelated internal arithmetic.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

from: function
where:
  # visibility is a "dual" field (valid in both filter/match layers); bare at
  # top level it would route to the AST-match layer and be checked against
  # the matched binary_op/assign node (which has no visibility attribute).
  # Wrapping in `all:` (context-only branch) forces it onto the function
  # precondition layer, matching v1's `filter.visibility`.
  - all:
      - visibility: public,external
  - has:
      any:
        - block: binary
          operator: '-'
          right:
            tainted: parameter
        - block: assign
          operator: '-='
          right:
            tainted: parameter
