meta:
  id: DECURITY-ORACLE-USES-CURVE-SPOT-PRICE
  title: "Decurity Semgrep: Oracle returns Curve get_p spot price"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects oracle functions that return or propagate Curve get_p spot prices.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: function
  match:
    sequence:
      - kind: call.external
        name: '^get_p$'
      - kind: stmt.return
