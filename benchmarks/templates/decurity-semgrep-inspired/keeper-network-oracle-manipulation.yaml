meta:
  id: DECURITY-KEEPER-NETWORK-ORACLE-MANIPULATION
  title: "Decurity Semgrep: Keep3r current() spot quote is used as oracle data"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects Keep3r-style current(tokenIn, amountIn, tokenOut) spot quotes used
    in oracle-like functions.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: function
  match:
    contains:
      kind: call.external
      name: '^current$'
      args:
        0:
          tainted_from: parameter
        1:
          tainted_from: parameter
        2:
          tainted_from: parameter
