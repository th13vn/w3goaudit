meta:
  id: DECURITY-UNISWAP-V4-CALLBACK-NOT-PROTECTED
  title: "Decurity Semgrep: Uniswap v4 hook callback lacks onlyPoolManager protection"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects Uniswap v4 hook callbacks that are external but lack onlyPoolManager
    or equivalent sender validation.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  where:
    - func_name: '^(beforeInitialize|afterInitialize|beforeAddLiquidity|afterAddLiquidity|beforeRemoveLiquidity|afterRemoveLiquidity|beforeSwap|afterSwap|beforeDonate|afterDonate)$'
    - all:
        - visibility: external
    - not: { preset: access_controlled }
    - not:
        modifier: '(?i)onlyPoolManager'
    - block: function
