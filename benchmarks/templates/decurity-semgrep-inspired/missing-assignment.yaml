meta:
  id: DECURITY-MISSING-ASSIGNMENT
  title: "Decurity Semgrep: Expression statement looks like a missing assignment or check"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects suspicious standalone expressions that look like a forgotten
    assignment or comparison result.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: function
  where:
    # regex is a "dual" field; bare at top level it would route to the AST-match
    # layer (checked against the matched identifier/binary_op node's own text).
    # Wrapping in `all:` forces it onto the function precondition layer.
    - all:
        - regex: '(?m)^\s*(?:[A-Za-z_][A-Za-z0-9_]*(?:\[[^\]]+\])?|\w+\s*==\s*\w+)\s*;'
    - has:
        any:
          - block: identifier
          - block: binary
            operator: '=='
