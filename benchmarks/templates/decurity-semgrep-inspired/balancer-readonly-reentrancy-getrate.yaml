meta:
  id: DECURITY-BALANCER-READONLY-REENTRANCY-GETRATE
  title: "Decurity Semgrep: Balancer getRate read is not protected from read-only reentrancy"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects Balancer getRate reads in functions that do not perform the
    standard Vault read-only reentrancy mitigation.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: function
  select: external_call
  where:
    - name: '^getRate$'
    - all:
        - not:
            func_name: '^_updateTokenRateCache$'
        - not:
            regex: 'VaultReentrancyLib\.ensureNotInVaultContext\s*\('
        - not:
            regex: '\.manageUserBalance\s*\('
