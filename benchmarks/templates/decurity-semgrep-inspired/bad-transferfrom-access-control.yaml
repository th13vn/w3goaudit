meta:
  id: DECURITY-BAD-TRANSFERFROM-ACCESS-CONTROL
  title: "Decurity Semgrep: transferFrom can be called with arbitrary addresses"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated entrypoints that pass user-controlled from/to
    addresses into ERC20 or ERC721 transferFrom-style calls.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  scope: entrypoint
  filter:
    preset: unAuthenticated
  match:
    contains:
      kind: token_call
      name: '^(transferFrom|safeTransferFrom)$'
      args:
        0:
          tainted_from: parameter
        1:
          tainted_from: parameter
