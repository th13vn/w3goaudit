meta:
  id: DECURITY-ERC777-REENTRANCY
  title: "Decurity Semgrep: ERC777 tokensReceived hook is invoked"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects ERC777 tokensReceived hook invocations without a reentrancy guard.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  select: external_call
  where:
    - not: { preset: reentrancy_guarded }
    - name: '^tokensReceived$'
