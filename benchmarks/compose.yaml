services:
  benchmark:
    platform: linux/amd64
    build:
      context: ..
      dockerfile: benchmarks/Dockerfile
    environment:
      RUN_NAME: ${RUN_NAME:-latest}
      SUITE: ${SUITE:-competitive}
      TOOLS: ${TOOLS:-w3goaudit,slither,semgrep,4naly3er}
    read_only: true
    tmpfs:
      - /tmp:rw,exec,nosuid,nodev,mode=1777,size=4g
    volumes:
      - ./results:/workspace/benchmarks/results
