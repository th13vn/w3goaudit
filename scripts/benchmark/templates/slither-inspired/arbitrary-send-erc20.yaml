meta:
  id: SLITHER-ARBITRARY-SEND-ERC20
  title: "Arbitrary ERC20 transferFrom"
  severity: HIGH
  confidence: HIGH
  description: >
    Detects when msg.sender is not used as the 'from' parameter in transferFrom.
    If a user-controlled address is passed as 'from', an attacker can transfer
    tokens from any address that has approved this contract. Equivalent to
    Slither's arbitrary-send-erc20 detector.
  recommendation: >
    Use msg.sender as the 'from' parameter in transferFrom, or add proper
    access control (onlyOwner, auth) to restrict who can call the function.

# `external_call` plus `name:` identifies the ERC20 method shape.
query:
  from: entry_function
  select: external_call
  where:
    - not: { preset: access_controlled }
    - name: ^transferFrom$
    - arg.0: { tainted: parameter }
