meta:
  id: DECURITY-BASIC-ORACLE-MANIPULATION
  title: "Decurity Semgrep: Oracle price calculation uses manipulable reserves over totalSupply"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects price getter functions that divide manipulable reserve-like values
    by totalSupply.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: function
  where:
    - func_name: '(?i)get.*price'
    - has:
        any:
          - block: binary
            operator: '/'
            left:
              name: '^(reserve0|reserve1|reserve|underlying|underlyingUnit|pair)$'
            right:
              name: 'totalSupply'
          - block: external_call
            name: '^div$'
            has:
              name: '^(reserve0|reserve1|reserve|underlying|underlyingUnit|pair)$'
            arg.0:
              name: 'totalSupply'
