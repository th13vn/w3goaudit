meta:
  id: DECURITY-COMPOUND-PRECISION-LOSS
  title: "Decurity Semgrep: Compound redeemFresh trusts redeemAmountIn when totalSupply can be zero"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects Compound-style redeemFresh logic that copies redeemAmountIn
    directly into redeemAmount.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: function
  select: assign
  where:
    - func_name: '^redeemFresh$'
    - and:
        - visibility: internal
    - left:
        name: '^redeemAmount$'
    - right:
        name: '^redeemAmountIn$'
