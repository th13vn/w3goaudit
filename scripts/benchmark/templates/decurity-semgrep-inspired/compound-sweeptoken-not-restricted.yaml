meta:
  id: DECURITY-COMPOUND-SWEEPTOKEN-NOT-RESTRICTED
  title: "Decurity Semgrep: Compound sweepToken is callable without admin restriction"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated Compound-style sweepToken functions that transfer
    tokens out.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  select: external_call
  where:
    - func_name: '^sweepToken$'
    - not: { preset: access_controlled }
    - name: '^transfer$'
