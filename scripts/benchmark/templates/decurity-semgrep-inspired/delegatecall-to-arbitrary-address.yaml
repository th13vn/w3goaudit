meta:
  id: DECURITY-DELEGATECALL-TO-ARBITRARY-ADDRESS
  title: "Decurity Semgrep: User supplied address reaches delegatecall"
  severity: HIGH
  confidence: MEDIUM
  description: >
    Detects unauthenticated entrypoints where a user-controlled address is used
    as a delegatecall receiver.
  recommendation: >
    Review the Decurity rule semantics and add access control, validation,
    reentrancy protection, or safer arithmetic/oracle handling as appropriate.
  references:
    - https://github.com/Decurity/semgrep-smart-contracts/tree/master/solidity/security

query:
  from: entry_function
  select: delegatecall
  where:
    - not: { preset: access_controlled }
    - and:
        - has:
            receiver: true
            tainted: user_controlled
        - arg.0:
            tainted: user_controlled
