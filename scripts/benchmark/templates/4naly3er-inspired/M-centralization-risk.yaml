meta:
  id: 4NALY3ER-M-002
  title: "Centralization Risk — Privileged Owner/Role"
  severity: MEDIUM
  confidence: HIGH
  description: >
    Detects functions guarded by ownership/role modifiers that perform
    ETH transfers, token transfers, or external calls — the highest-risk
    privileged operations. Contracts with these patterns require users to
    trust the owner won't act maliciously (rug pull, drain funds).
    Equivalent to 4naly3er's centralizationRisk detector.
  recommendation: >
    Use multisig or DAO governance for privileged actions. Implement timelocks.
    Use Ownable2Step for safer ownership transfer. Document all trust assumptions.

query:
  from: entry_function
  where:
    - modifier: (?i)^(onlyOwner|onlyAdmin|onlyRole|requiresAuth|onlyGovernance|onlyGov|onlyDAO|onlyManager)$
    - any:
        - has: { block: state_write }
        - has: { block: outgoing_call }
