meta:
  id: 4NALY3ER-H-002
  title: "Delegate Call Inside Loop"
  severity: HIGH
  confidence: HIGH
  description: >
    Detects delegatecall() inside a loop body. Each iteration executes
    arbitrary code in the context of this contract's storage. If the target
    is user-controlled or the call can be influenced mid-loop, an attacker
    can corrupt storage or drain funds across multiple iterations.
    Equivalent to 4naly3er's delegateCallInLoop detector.
  recommendation: >
    Avoid delegatecall inside loops. If multicall is needed, implement a
    dedicated multicall pattern with strict access control and target
    whitelisting.

query:
  from: function
  select: loop
  where:
    - has: { block: delegatecall }
