meta:
  id: 4NALY3ER-M-004
  title: "Chainlink latestRoundData() — Stale/Incorrect Results Not Validated"
  severity: MEDIUM
  confidence: MEDIUM
  description: >
    Detects calls to Chainlink's latestRoundData() in functions that contain
    no validation guard (require/assert/revert). Without these checks the
    contract may consume stale prices. This is a top-recurring finding in
    competitive audits (C4, Sherlock).
    Equivalent to 4naly3er's staleOracleData detector.
  recommendation: >
    After calling latestRoundData(), always validate:
      require(answer > 0, "Invalid price");
      require(updatedAt >= block.timestamp - STALE_PERIOD, "Stale price");
      require(answeredInRound >= roundId, "Stale round");

query:
  from: function
  where:
    - has:
        block: external_call
        name: ^latestRoundData$
    - not:
        has:
          block: guard
