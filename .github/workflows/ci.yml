name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: build, test, vet, fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt (fail on unformatted files)
        run: |
          unformatted=$(gofmt -l ./cmd ./pkg ./templates)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: integration smoke test
        run: |
          go build -o /tmp/w3goaudit ./cmd/w3goaudit
          # Embedded default pack must scan out of the box.
          /tmp/w3goaudit test-data/security/ >/dev/null
          # --fail-on must gate (this corpus has HIGH+ findings → exit 2).
          if /tmp/w3goaudit test-data/security/ --fail-on high >/dev/null; then
            echo "expected --fail-on high to exit non-zero on the security corpus"
            exit 1
          fi
